<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paymob Merchant Checklist</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0057FF;--blue-dark:#0040CC;--blue-deeper:#002E99;
  --blue-light:#E6EEFF;--blue-mid:#BBCFFF;
  --gray-50:#F7F9FF;--gray-100:#EEF2FF;--gray-200:#DDE6FF;
  --border:#D0DCFF;--text-main:#0A1A3C;--text-muted:#4A5F8A;
  --text-light:#7A90B8;--radius:12px;--radius-sm:7px;
}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;background:var(--gray-50);color:var(--text-main);min-height:100vh;padding-bottom:4rem}
header{background:var(--blue);position:relative;overflow:hidden}
header::before{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.06)}
header::after{content:"";position:absolute;right:80px;top:30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.04)}
.header-inner{max-width:960px;margin:0 auto;padding:26px 32px 22px;display:flex;align-items:center;justify-content:space-between;gap:20px;position:relative;z-index:2}
.header-left{display:flex;align-items:center;gap:14px}
.hdiv{width:1px;height:36px;background:rgba(255,255,255,.25);flex-shrink:0}
.header-titles{display:flex;flex-direction:column;gap:3px}
.header-tag{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.header-title{font-size:21px;font-weight:700;color:#fff;letter-spacing:-.01em}
.paymob-wordmark{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.5px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.header-date{font-size:12px;color:rgba(255,255,255,.55)}
.progress-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600;color:#fff}
.stats-bar{background:var(--blue-dark);border-bottom:1px solid var(--blue-deeper)}
.stats-inner{max-width:960px;margin:0 auto;padding:11px 32px;display:flex;gap:28px;align-items:center}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-num{font-size:18px;font-weight:700;color:#fff}
.stat-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em}
.stat-div{width:1px;height:30px;background:rgba(255,255,255,.15)}
.progress-track{flex:1;height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#fff;border-radius:3px;transition:width .35s ease}
.merchant-bar{background:#fff;border-bottom:1px solid var(--border)}
.merchant-inner{max-width:960px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.merchant-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.merchant-input{flex:1;min-width:180px;font-size:14px;font-weight:500;color:var(--text-main);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;outline:none;font-family:inherit;background:var(--gray-50)}
.merchant-input:focus{border-color:var(--blue);background:#fff}
.merchant-select{font-size:13px;color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;outline:none;font-family:inherit;background:var(--gray-50);cursor:pointer;min-width:200px}
.btn{font-size:12px;font-weight:600;font-family:inherit;border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text-muted);transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--gray-100)}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-dark)}
.btn-green{background:#16a34a;border-color:#16a34a;color:#fff}
.btn-green:hover{background:#15803d}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:#fff;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px}
.toast.show{opacity:1}
.toast.success{background:#16a34a}
.toast.error{background:#dc2626}
.toast.info{background:var(--blue)}
main{max-width:960px;margin:0 auto;padding:24px 32px 0}
.controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.ctrl-left{display:flex;gap:8px;flex-wrap:wrap}
.ctrl-right{font-size:11px;color:var(--text-light)}
.section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.section-head{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--gray-100);border-bottom:1px solid var(--border)}
.section-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.section-title-input{flex:1;font-size:13px;font-weight:600;color:var(--text-main);background:none;border:none;outline:none;cursor:text;font-family:inherit}
.section-title-input:focus{background:#fff;border-radius:4px;padding:2px 6px}
.section-count{font-size:11px;color:var(--text-light);background:var(--gray-200);padding:2px 8px;border-radius:10px;font-weight:500}
.del-sec-btn{background:none;border:none;color:var(--text-light);font-size:18px;cursor:pointer;line-height:1;padding:0 2px}
.del-sec-btn:hover{color:#dc2626}
.item{border-bottom:1px solid var(--gray-100)}
.item:last-of-type{border-bottom:none}
.item-top{display:flex;align-items:center;gap:10px;padding:9px 16px 8px;transition:background .1s}
.item-top:hover{background:var(--gray-50)}
.item.done .item-top{opacity:.5}
.item.done .item-text-input{text-decoration:line-through}
.checkbox{width:17px;height:17px;border:1.5px solid var(--blue-mid);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;transition:background .15s,border-color .15s}
.checkbox.checked{background:var(--blue);border-color:var(--blue)}
.checkmark{display:none}
.checkbox.checked .checkmark{display:block}
.item-text-input{flex:1;font-size:13px;color:var(--text-main);background:none;border:none;outline:none;cursor:text;font-family:inherit;line-height:1.45}
.item-text-input:focus{background:var(--gray-100);border-radius:4px;padding:2px 6px}
.expand-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-light);font-size:11px;cursor:pointer;padding:2px 8px;white-space:nowrap;font-family:inherit;transition:background .12s,color .12s}
.expand-btn:hover,.expand-btn.open{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid)}
.del-item-btn{background:none;border:none;color:var(--text-light);font-size:15px;cursor:pointer;opacity:0;padding:0 2px;flex-shrink:0}
.item-top:hover .del-item-btn{opacity:1}
.del-item-btn:hover{color:#dc2626}
.answer-wrap{display:none;padding:0 16px 12px 43px;background:var(--gray-50);border-top:1px solid var(--gray-100)}
.answer-wrap.open{display:block}
.answer-label{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;padding-top:10px}
.answer-textarea{width:100%;min-height:64px;font-size:13px;font-family:inherit;color:var(--text-main);background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;resize:vertical;outline:none;line-height:1.5;transition:border-color .15s}
.answer-textarea:focus{border-color:var(--blue)}
.answer-textarea::placeholder{color:var(--text-light)}
.add-item-row{display:flex;align-items:center;gap:10px;padding:7px 16px;border-top:1px dashed var(--border);background:var(--gray-50)}
.add-item-row input{flex:1;font-size:13px;color:var(--text-muted);background:none;border:none;outline:none;font-family:inherit}
.add-item-row input::placeholder{color:var(--text-light)}
.add-icon{color:var(--blue-mid);font-size:16px}
.add-sec-btn{width:100%;padding:10px 16px;background:none;border:1px dashed var(--blue-mid);border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--blue);cursor:pointer;text-align:left;font-family:inherit;transition:background .15s;margin-top:4px}
.add-sec-btn:hover{background:var(--blue-light)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:12px}
.loading-overlay.hidden{display:none}
.spinner{width:32px;height:32px;border:3px solid var(--blue-mid);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-muted)}
footer{max-width:960px;margin:24px auto 0;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
.footer-text{font-size:12px;color:var(--text-light)}
.footer-label{font-size:11px;color:var(--text-light);background:var(--gray-100);border:1px solid var(--border);border-radius:6px;padding:3px 10px}
</style>
</head>
<body>
 
<div class="loading-overlay hidden" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading...</div>
</div>
<div class="toast" id="toast"></div>
 
<header>
  <div class="header-inner">
    <div class="header-left">
      <span class="paymob-wordmark">paymob</span>
      <div class="hdiv"></div>
      <div class="header-titles">
        <span class="header-tag">Integration Consulting</span>
        <span class="header-title">Merchant Onboarding Checklist</span>
      </div>
    </div>
    <div class="header-right">
      <span class="header-date" id="hdate"></span>
      <span class="progress-pill" id="hprog">0 / 0 done</span>
    </div>
  </div>
</header>
 
<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat"><span class="stat-num" id="s-done">0</span><span class="stat-label">Covered</span></div>
    <div class="stat-div"></div>
    <div class="stat"><span class="stat-num" id="s-left">0</span><span class="stat-label">Remaining</span></div>
    <div class="stat-div"></div>
    <div class="stat"><span class="stat-num" id="s-pct">0%</span><span class="stat-label">Complete</span></div>
    <div class="stat-div"></div>
    <div class="progress-track"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  </div>
</div>
 
<div class="merchant-bar">
  <div class="merchant-inner">
    <span class="merchant-label">Merchant</span>
    <input class="merchant-input" id="merchant-name" placeholder="Enter merchant name..." />
    <select class="merchant-select" id="session-select" onchange="loadSession(this.value)">
      <option value="">-- Load existing session --</option>
    </select>
    <button class="btn btn-blue" onclick="newSession()">+ New</button>
    <button class="btn btn-green" onclick="saveToCloud()">Save to database</button>
    <button class="btn" onclick="exportPDF()">Export PDF</button>
  </div>
</div>
 
<main>
  <div class="controls">
    <div class="ctrl-left">
      <button class="btn" onclick="expandAll()">Expand all</button>
      <button class="btn" onclick="collapseAll()">Collapse all</button>
      <button class="btn" onclick="resetAll()">Uncheck all</button>
      <button class="btn" onclick="addSection()">+ Add section</button>
    </div>
    <div class="ctrl-right" id="last-saved"></div>
  </div>
  <div id="checklist"></div>
</main>
 
<footer>
  <span class="footer-text">Paymob Integration Consulting -- Team Shared</span>
  <span class="footer-label">v2.0 Supabase</span>
</footer>
 
<script>
var SUPA_URL = 'https://teyajssqspfaxtbvebqj.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRleWFqc3Nxc3BmYXh0YnZlYnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTA5MTksImV4cCI6MjA5MzI4NjkxOX0.4Nf4hRrM6jce-MShIxKy-uiRkCBeNnR6aHEnl0cxTG0';
var currentId = null;
var sections = getDefaults();
 
function getDefaults() {
  return [
    {title:'Business understanding', items:[
      {t:'What do they do and how do they make money?', done:false, answer:''},
      {t:'Who am I speaking with and what is their role?', done:false, answer:''},
      {t:'Business type: e-commerce, SaaS, restaurant, marketplace?', done:false, answer:''},
      {t:'Have they integrated a payment gateway before?', done:false, answer:''}
    ]},
    {title:'Goals and timeline', items:[
      {t:'What specific outcome are they trying to achieve?', done:false, answer:''},
      {t:'Is there a hard go-live date and what is driving it?', done:false, answer:''},
      {t:'How many developers are assigned to this?', done:false, answer:''},
      {t:'Any upcoming blockers such as holidays or freezes?', done:false, answer:''}
    ]},
    {title:'Technical setup', items:[
      {t:'What language, framework, or platform are they using?', done:false, answer:''},
      {t:'Website, mobile app, or both?', done:false, answer:''},
      {t:'Any existing PSP or payment system in place?', done:false, answer:''},
      {t:'Do they have a test or staging environment?', done:false, answer:''}
    ]},
    {title:'Payment flows', items:[
      {t:'Which payment methods must work at launch?', done:false, answer:''},
      {t:'Which currencies and countries are in scope?', done:false, answer:''},
      {t:'Expected monthly volume and peak load?', done:false, answer:''},
      {t:'Any recurring billing, refunds, or split payments needed?', done:false, answer:''}
    ]},
    {title:'Risk and operations', items:[
      {t:'Who owns fraud and compliance decisions on their side?', done:false, answer:''},
      {t:'Fallback plan if the payment system goes down?', done:false, answer:''},
      {t:'Who maintains the integration after go-live?', done:false, answer:''},
      {t:'Who has final sign-off authority?', done:false, answer:''}
    ]}
  ];
}
 
function esc(s) {
  var r = String(s || '');
  r = r.split('&').join('&amp;');
  r = r.split('"').join('&quot;');
  r = r.split('<').join('&lt;');
  r = r.split('>').join('&gt;');
  return r;
}
 
function dbHeaders() {
  return {
    'Content-Type': 'application/json',
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Prefer': 'return=representation'
  };
}
 
async function dbFetch(path, opts) {
  opts = opts || {};
  opts.headers = dbHeaders();
  var res = await fetch(SUPA_URL + path, opts);
  if (!res.ok) {
    var msg = await res.text();
    throw new Error(msg);
  }
  try { return await res.json(); } catch(e) { return null; }
}
 
async function loadAllSessions() {
  try {
    var rows = await dbFetch('/rest/v1/merchant_sessions?select=id,merchant_name,updated_at,completed_count,total_count&order=updated_at.desc');
    var sel = document.getElementById('session-select');
    sel.innerHTML = '<option value="">-- Load existing session --</option>';
    (rows || []).forEach(function(s) {
      var pct = s.total_count ? Math.round(s.completed_count / s.total_count * 100) : 0;
      var d = new Date(s.updated_at || '').toLocaleDateString('en-GB', {day:'numeric', month:'short'});
      var opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.merchant_name + ' - ' + pct + '% - ' + d;
      sel.appendChild(opt);
    });
  } catch(e) {
    showToast('Could not load sessions: ' + e.message, 'error');
  }
}
 
async function loadSession(id) {
  if (!id) return;
  showLoading('Loading session...');
  try {
    var rows = await dbFetch('/rest/v1/merchant_sessions?id=eq.' + id + '&select=*');
    if (rows && rows[0]) {
      var s = rows[0];
      currentId = s.id;
      document.getElementById('merchant-name').value = s.merchant_name || '';
      sections = s.sections || getDefaults();
      var d = new Date(s.updated_at || '').toLocaleString('en-GB', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
      document.getElementById('last-saved').textContent = 'Last saved: ' + d;
      render();
      showToast('Loaded: ' + s.merchant_name, 'success');
    }
  } catch(e) {
    showToast('Load failed: ' + e.message, 'error');
  }
  hideLoading();
}
 
async function saveToCloud() {
  collectAnswers();
  var name = document.getElementById('merchant-name').value.trim();
  if (!name) {
    showToast('Enter a merchant name first', 'error');
    document.getElementById('merchant-name').focus();
    return;
  }
  var done = 0, total = 0;
  sections.forEach(function(s) {
    total += s.items.length;
    done += s.items.filter(function(i) { return i.done; }).length;
  });
  showLoading('Saving...');
  try {
    if (currentId) {
      await dbFetch('/rest/v1/merchant_sessions?id=eq.' + currentId, {
        method: 'PATCH',
        body: JSON.stringify({
          merchant_name: name,
          sections: sections,
          completed_count: done,
          total_count: total,
          updated_at: new Date().toISOString()
        })
      });
      showToast('Saved!', 'success');
    } else {
      var result = await dbFetch('/rest/v1/merchant_sessions', {
        method: 'POST',
        body: JSON.stringify({
          merchant_name: name,
          sections: sections,
          completed_count: done,
          total_count: total
        })
      });
      if (result && result[0]) currentId = result[0].id;
      showToast('New session saved!', 'success');
    }
    var now = new Date().toLocaleString('en-GB', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
    document.getElementById('last-saved').textContent = 'Saved: ' + now;
    await loadAllSessions();
    if (currentId) document.getElementById('session-select').value = currentId;
  } catch(e) {
    showToast('Save failed: ' + e.message, 'error');
  }
  hideLoading();
}
 
function newSession() {
  if (!confirm('Start a new blank session? Unsaved changes will be lost.')) return;
  currentId = null;
  document.getElementById('merchant-name').value = '';
  document.getElementById('session-select').value = '';
  document.getElementById('last-saved').textContent = '';
  sections = getDefaults();
  render();
  document.getElementById('merchant-name').focus();
  showToast('New session started', 'info');
}
 
function exportPDF() {
  collectAnswers();
  var name = document.getElementById('merchant-name').value || 'Merchant';
  var rows = '';
  sections.forEach(function(sec) {
    rows += '<h2>' + sec.title + '</h2>';
    sec.items.forEach(function(item) {
      var ansHtml = '';
      if (item.answer) {
        ansHtml = '<div class=ans>' + item.answer.split('\n').join('<br>') + '</div>';
      }
      var cb = item.done ? '<div class="cb done">V</div>' : '<div class="cb"></div>';
      rows += '<div class=item>' + cb + '<div class=q>' + item.t + ansHtml + '</div></div>';
    });
  });
  var doc = '<html><head><style>';
  doc += 'body{font-family:Arial,sans-serif;padding:32px;color:#0A1A3C;max-width:780px;margin:0 auto}';
  doc += 'h1{color:#0057FF;font-size:22px;margin-bottom:4px}';
  doc += 'h2{font-size:14px;color:#4A5F8A;margin:24px 0 8px;border-bottom:1px solid #DDE6FF;padding-bottom:4px}';
  doc += '.item{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #EEF2FF}';
  doc += '.cb{width:14px;min-width:14px;height:14px;border:2px solid #BBCFFF;border-radius:3px;margin-top:2px;font-size:9px;display:flex;align-items:center;justify-content:center}';
  doc += '.cb.done{background:#0057FF;border-color:#0057FF;color:#fff}';
  doc += '.q{font-size:13px;flex:1}';
  doc += '.ans{background:#F7F9FF;border-left:3px solid #0057FF;padding:5px 10px;margin:4px 0 2px;font-size:12px;color:#4A5F8A;border-radius:0 4px 4px 0}';
  doc += '.meta{font-size:12px;color:#7A90B8;margin-bottom:20px}';
  doc += '</style></head><body>';
  doc += '<h1>Paymob Merchant Onboarding</h1>';
  doc += '<div class=meta>Merchant: <strong>' + name + '</strong> | ' + new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) + '</div>';
  doc += rows + '</body></html>';
  var w = window.open('', '_blank');
  if (w) {
    w.document.write(doc);
    w.document.close();
    setTimeout(function() { w.print(); }, 600);
  }
}
 
function collectAnswers() {
  document.querySelectorAll('.answer-textarea').forEach(function(ta) {
    var wrap = ta.closest('.answer-wrap');
    if (!wrap) return;
    var parts = wrap.id.split('-');
    var si = parseInt(parts[1]);
    var ii = parseInt(parts[2]);
    if (sections[si] && sections[si].items[ii]) {
      sections[si].items[ii].answer = ta.value;
    }
  });
  document.querySelectorAll('.item-text-input').forEach(function(inp) {
    var el = inp.closest('.item');
    if (!el) return;
    var parts = el.id.split('-');
    var si = parseInt(parts[1]);
    var ii = parseInt(parts[2]);
    if (sections[si] && sections[si].items[ii]) {
      sections[si].items[ii].t = inp.value;
    }
  });
}
 
function render() {
  var cl = document.getElementById('checklist');
  cl.innerHTML = '';
  sections.forEach(function(sec, si) {
    var doneCt = sec.items.filter(function(i) { return i.done; }).length;
    var div = document.createElement('div');
    div.className = 'section';
    var itemsHtml = '';
    sec.items.forEach(function(item, ii) {
      var uid = 'a-' + si + '-' + ii;
      var ansOpen = item.answer ? ' open' : '';
      var btnLabel = item.answer ? 'View answer' : 'Add answer';
      var doneClass = item.done ? ' done' : '';
      var checkedClass = item.done ? ' checked' : '';
      itemsHtml += '<div class="item' + doneClass + '" id="item-' + si + '-' + ii + '">';
      itemsHtml += '<div class="item-top">';
      itemsHtml += '<div class="checkbox' + checkedClass + '" onclick="toggle(' + si + ',' + ii + ')">';
      itemsHtml += '<svg class="checkmark" width="9" height="9" viewBox="0 0 9 9" fill="none">';
      itemsHtml += '<path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>';
      itemsHtml += '</svg></div>';
      itemsHtml += '<input class="item-text-input" value="' + esc(item.t) + '" onchange="sections[' + si + '].items[' + ii + '].t=this.value" />';
      itemsHtml += '<button class="expand-btn' + ansOpen + '" id="btn-' + uid + '" onclick="toggleAnswer(\'' + uid + '\')">' + btnLabel + '</button>';
      itemsHtml += '<button class="del-item-btn" onclick="delItem(' + si + ',' + ii + ')">x</button>';
      itemsHtml += '</div>';
      itemsHtml += '<div class="answer-wrap' + ansOpen + '" id="' + uid + '">';
      itemsHtml += '<div class="answer-label">Answer / Notes</div>';
      itemsHtml += '<textarea class="answer-textarea" placeholder="Type your answer here..." onchange="sections[' + si + '].items[' + ii + '].answer=this.value;updateBtn(\'' + uid + '\',this.value)">' + esc(item.answer) + '</textarea>';
      itemsHtml += '</div></div>';
    });
    var secHtml = '';
    secHtml += '<div class="section-head">';
    secHtml += '<div class="section-dot"></div>';
    secHtml += '<input class="section-title-input" value="' + esc(sec.title) + '" onchange="sections[' + si + '].title=this.value" />';
    secHtml += '<span class="section-count">' + doneCt + ' / ' + sec.items.length + '</span>';
    secHtml += '<button class="del-sec-btn" onclick="delSection(' + si + ')">x</button>';
    secHtml += '</div>';
    secHtml += itemsHtml;
    secHtml += '<div class="add-item-row"><span class="add-icon">+</span>';
    secHtml += '<input placeholder="Add item and press Enter..." onkeydown="if(event.key===\'Enter\'&&this.value.trim()){addItem(' + si + ',this.value.trim());this.value=\'\'}" />';
    secHtml += '</div>';
    div.innerHTML = secHtml;
    cl.appendChild(div);
  });
  updateStats();
}
 
function toggleAnswer(uid) {
  var wrap = document.getElementById(uid);
  var btn = document.getElementById('btn-' + uid);
  var isOpen = wrap.classList.contains('open');
  wrap.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}
 
function updateBtn(uid, val) {
  var btn = document.getElementById('btn-' + uid);
  if (btn) btn.textContent = val ? 'View answer' : 'Add answer';
}
 
function expandAll() {
  document.querySelectorAll('.answer-wrap').forEach(function(w) { w.classList.add('open'); });
  document.querySelectorAll('.expand-btn').forEach(function(b) { b.classList.add('open'); });
}
 
function collapseAll() {
  document.querySelectorAll('.answer-wrap').forEach(function(w) { w.classList.remove('open'); });
  document.querySelectorAll('.expand-btn').forEach(function(b) { b.classList.remove('open'); });
}
 
function toggle(si, ii) { sections[si].items[ii].done = !sections[si].items[ii].done; render(); }
function delItem(si, ii) { sections[si].items.splice(ii, 1); render(); }
function delSection(si) { if (confirm('Remove this section?')) { sections.splice(si, 1); render(); } }
function addItem(si, t) { sections[si].items.push({t:t, done:false, answer:''}); render(); }
function addSection() { sections.push({title:'New section', items:[]}); render(); }
function resetAll() { sections.forEach(function(s) { s.items.forEach(function(i) { i.done = false; }); }); render(); }
 
function updateStats() {
  var done = 0, total = 0;
  sections.forEach(function(s) {
    total += s.items.length;
    done += s.items.filter(function(i) { return i.done; }).length;
  });
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = total - done;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('hprog').textContent = done + ' / ' + total + ' done';
}
 
var toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'info') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3500);
}
 
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || 'Loading...';
  document.getElementById('loading').classList.remove('hidden');
}
 
function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}
 
document.getElementById('hdate').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
render();
loadAllSessions();
</script>
</body>
</html>
