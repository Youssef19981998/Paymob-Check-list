<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paymob — Merchant Onboarding Checklist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #0057FF;
    --blue-dark: #0040CC;
    --blue-deeper: #002E99;
    --blue-light: #E6EEFF;
    --blue-mid: #BBCFFF;
    --white: #ffffff;
    --gray-50: #F7F9FF;
    --gray-100: #EEF2FF;
    --gray-200: #DDE6FF;
    --border: #D0DCFF;
    --text-main: #0A1A3C;
    --text-muted: #4A5F8A;
    --text-light: #7A90B8;
    --radius: 12px;
    --radius-sm: 7px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--gray-50);
    color: var(--text-main);
    min-height: 100vh;
    padding-bottom: 4rem;
  }

  /* HEADER */
  header {
    background: var(--blue);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  header::after {
    content: '';
    position: absolute;
    right: 80px; top: 30px;
    width: 110px; height: 110px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 26px 32px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    position: relative;
    z-index: 2;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-paymob { height: 46px; width: 46px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
  .header-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.25); flex-shrink: 0; }
  .header-titles { display: flex; flex-direction: column; gap: 3px; }
  .header-tag { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  .header-title { font-size: 21px; font-weight: 700; color: var(--white); letter-spacing: -.01em; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .header-date { font-size: 12px; color: rgba(255,255,255,0.55); }
  .progress-pill {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
  }

  /* STATS BAR */
  .stats-bar { background: var(--blue-dark); border-bottom: 1px solid var(--blue-deeper); }
  .stats-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 11px 32px;
    display: flex;
    gap: 28px;
    align-items: center;
  }
  .stat { display: flex; flex-direction: column; gap: 1px; }
  .stat-num { font-size: 18px; font-weight: 700; color: var(--white); }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: .06em; }
  .stat-div { width: 1px; height: 30px; background: rgba(255,255,255,0.15); }
  .progress-track { flex: 1; height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--white); border-radius: 3px; transition: width .35s ease; }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 24px 32px 0; }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .ctrl-group { display: flex; gap: 8px; align-items: center; }

  .btn {
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-muted);
    transition: background .15s;
  }
  .btn:hover { background: var(--gray-100); }
  .btn-primary {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--blue-dark); }
  .save-hint { font-size: 11px; color: var(--text-light); }
  #save-status { font-size: 12px; color: #16a34a; font-weight: 500; opacity: 0; transition: opacity .4s; }

  /* SECTION */
  .section {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .section-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--gray-100);
    border-bottom: 1px solid var(--border);
  }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
  .section-title-input {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    background: none;
    border: none;
    outline: none;
    cursor: text;
    font-family: inherit;
  }
  .section-title-input:focus { background: var(--white); border-radius: 4px; padding: 2px 6px; }
  .section-count { font-size: 11px; color: var(--text-light); background: var(--gray-200); padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .del-sec-btn { background: none; border: none; color: var(--text-light); font-size: 18px; cursor: pointer; line-height: 1; padding: 0 2px; }
  .del-sec-btn:hover { color: #e53e3e; }

  /* ITEM */
  .item {
    border-bottom: 1px solid var(--gray-100);
  }
  .item:last-of-type { border-bottom: none; }

  .item-top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px 8px;
    transition: background .1s;
    cursor: pointer;
  }
  .item-top:hover { background: var(--gray-50); }
  .item.done .item-top { opacity: .5; }
  .item.done .item-text-input { text-decoration: line-through; }

  .checkbox {
    width: 17px; height: 17px;
    border: 1.5px solid var(--blue-mid);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: var(--white);
    transition: background .15s, border-color .15s;
  }
  .checkbox.checked { background: var(--blue); border-color: var(--blue); }
  .checkmark { display: none; }
  .checkbox.checked .checkmark { display: block; }

  .item-text-input {
    flex: 1;
    font-size: 13px;
    color: var(--text-main);
    background: none;
    border: none;
    outline: none;
    cursor: text;
    font-family: inherit;
    line-height: 1.45;
  }
  .item-text-input:focus { background: var(--gray-100); border-radius: 4px; padding: 2px 6px; }

  .expand-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-light);
    font-size: 11px;
    cursor: pointer;
    padding: 2px 7px;
    white-space: nowrap;
    font-family: inherit;
    transition: background .12s, color .12s;
  }
  .expand-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); }
  .expand-btn.open { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); }

  .del-item-btn {
    background: none; border: none; color: var(--text-light);
    font-size: 15px; cursor: pointer; opacity: 0; transition: opacity .1s;
    padding: 0 2px; flex-shrink: 0;
  }
  .item-top:hover .del-item-btn { opacity: 1; }
  .del-item-btn:hover { color: #e53e3e; }

  /* ANSWER BOX */
  .answer-wrap {
    display: none;
    padding: 0 16px 12px 43px;
    background: var(--gray-50);
    border-top: 1px solid var(--gray-100);
  }
  .answer-wrap.open { display: block; }
  .answer-label { font-size: 11px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; padding-top: 10px; }
  .answer-textarea {
    width: 100%;
    min-height: 64px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-main);
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    resize: vertical;
    outline: none;
    line-height: 1.5;
    transition: border-color .15s;
  }
  .answer-textarea:focus { border-color: var(--blue); }
  .answer-textarea::placeholder { color: var(--text-light); }

  /* ADD ITEM ROW */
  .add-item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    border-top: 1px dashed var(--border);
    background: var(--gray-50);
  }
  .add-item-row input {
    flex: 1; font-size: 13px; color: var(--text-muted);
    background: none; border: none; outline: none; font-family: inherit;
  }
  .add-item-row input::placeholder { color: var(--text-light); }
  .add-icon { color: var(--blue-mid); font-size: 16px; }

  /* ADD SECTION */
  .add-sec-btn {
    width: 100%; padding: 10px 16px;
    background: none;
    border: 1px dashed var(--blue-mid);
    border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    color: var(--blue); cursor: pointer;
    text-align: left; font-family: inherit;
    transition: background .15s;
    margin-top: 4px;
  }
  .add-sec-btn:hover { background: var(--blue-light); }

  /* FOOTER */
  footer {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-brand { display: flex; align-items: center; gap: 8px; }
  .footer-logo { height: 22px; width: 22px; border-radius: 5px; object-fit: cover; }
  .footer-text { font-size: 12px; color: var(--text-light); }
  .footer-label { font-size: 11px; color: var(--text-light); background: var(--gray-100); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; }
</style>
</head>

<script>
const KEY = 'paymob_cl_v2';
let sections = [
  {title:"Business understanding", items:[
    {t:"What do they do and how do they make money?", done:false, answer:""},
    {t:"Who am I speaking with and what is their role?", done:false, answer:""},
    {t:"Business type — e-commerce, SaaS, restaurant, marketplace?", done:false, answer:""},
    {t:"Have they integrated a payment gateway before?", done:false, answer:""},
  ]},
  {title:"Goals & timeline", items:[
    {t:"What specific outcome are they trying to achieve?", done:false, answer:""},
    {t:"Is there a hard go-live date? What is driving it?", done:false, answer:""},
    {t:"How many developers are assigned to this?", done:false, answer:""},
    {t:"Any upcoming blockers — holidays, freezes, other projects?", done:false, answer:""},
  ]},
  {title:"Technical setup", items:[
    {t:"What language, framework, or platform are they using?", done:false, answer:""},
    {t:"Website, mobile app, or both?", done:false, answer:""},
    {t:"Any existing PSP or payment system in place?", done:false, answer:""},
    {t:"Do they have a test / staging environment?", done:false, answer:""},
  ]},
  {title:"Payment flows", items:[
    {t:"Which payment methods must work at launch?", done:false, answer:""},
    {t:"Which currencies and countries are in scope?", done:false, answer:""},
    {t:"Expected monthly volume and peak load?", done:false, answer:""},
    {t:"Any recurring billing, refunds, or split payments needed?", done:false, answer:""},
  ]},
  {title:"Risk & operations", items:[
    {t:"Who owns fraud and compliance decisions on their side?", done:false, answer:""},
    {t:"Fallback plan if the payment system goes down?", done:false, answer:""},
    {t:"Who maintains the integration after go-live?", done:false, answer:""},
    {t:"Who has final sign-off authority?", done:false, answer:""},
  ]}
];

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(sections)); } catch(e) {}
}
function load() {
  try { const d = localStorage.getItem(KEY); if(d) sections = JSON.parse(d); } catch(e) {}
}
load();

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStats() {
  let done = 0, total = 0;
  sections.forEach(s => { total += s.items.length; done += s.items.filter(i => i.done).length; });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = total - done;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('hprog').textContent = done + ' / ' + total + ' done';
}

function render() {
  const cl = document.getElementById('checklist');
  cl.innerHTML = '';
  sections.forEach((sec, si) => {
    const doneCt = sec.items.filter(i => i.done).length;
    const div = document.createElement('div');
    div.className = 'section';
    let itemsHtml = sec.items.map((item, ii) => {
      const uid = 'a-' + si + '-' + ii;
      return '<div class="item' + (item.done ? ' done' : '') + '" id="item-' + si + '-' + ii + '">' +
        '<div class="item-top">' +
          '<div class="checkbox' + (item.done ? ' checked' : '') + '" onclick="toggle(' + si + ',' + ii + ')">' +
            '<svg class="checkmark" width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</div>' +
          '<input class="item-text-input" value="' + esc(item.t) + '" onchange="sections[' + si + '].items[' + ii + '].t=this.value;save()" />' +
          '<button class="expand-btn" id="btn-' + uid + '" onclick="toggleAnswer(\'' + uid + '\')">' +
            (item.answer ? 'View answer' : 'Add answer') +
          '</button>' +
          '<button class="del-item-btn" onclick="delItem(' + si + ',' + ii + ')">×</button>' +
        '</div>' +
        '<div class="answer-wrap' + (item.answer ? ' open' : '') + '" id="' + uid + '">' +
          '<div class="answer-label">Answer / Notes</div>' +
          '<textarea class="answer-textarea" placeholder="Type your answer here..." onchange="sections[' + si + '].items[' + ii + '].answer=this.value;save();updateBtnLabel(\'' + uid + '\',this.value)">' + esc(item.answer) + '</textarea>' +
        '</div>' +
      '</div>';
    }).join('');

    div.innerHTML =
      '<div class="section-head">' +
        '<div class="section-dot"></div>' +
        '<input class="section-title-input" value="' + esc(sec.title) + '" onchange="sections[' + si + '].title=this.value;save()" />' +
        '<span class="section-count">' + doneCt + ' / ' + sec.items.length + '</span>' +
        '<button class="del-sec-btn" onclick="delSection(' + si + ')">×</button>' +
      '</div>' +
      itemsHtml +
      '<div class="add-item-row">' +
        '<span class="add-icon">+</span>' +
        '<input placeholder="Add item and press Enter..." onkeydown="if(event.key===\'Enter\'&&this.value.trim()){addItem(' + si + ',this.value.trim());this.value=\'\'}" />' +
      '</div>';
    cl.appendChild(div);
  });
  updateStats();
}

function toggleAnswer(uid) {
  const wrap = document.getElementById(uid);
  const btn = document.getElementById('btn-' + uid);
  const isOpen = wrap.classList.contains('open');
  wrap.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  const ta = wrap.querySelector('textarea');
  if (!isOpen) { btn.textContent = ta.value ? 'View answer' : 'Add answer'; }
}

function updateBtnLabel(uid, val) {
  const btn = document.getElementById('btn-' + uid);
  if (btn) btn.textContent = val ? 'View answer' : 'Add answer';
}

function expandAll() {
  document.querySelectorAll('.answer-wrap').forEach(w => w.classList.add('open'));
  document.querySelectorAll('.expand-btn').forEach(b => b.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.answer-wrap').forEach(w => w.classList.remove('open'));
  document.querySelectorAll('.expand-btn').forEach(b => b.classList.remove('open'));
}

function toggle(si, ii) {
  sections[si].items[ii].done = !sections[si].items[ii].done;
  save(); render();
}
function delItem(si, ii) {
  sections[si].items.splice(ii, 1); save(); render();
}
function delSection(si) {
  if (confirm('Remove this section?')) { sections.splice(si, 1); save(); render(); }
}
function addItem(si, t) {
  sections[si].items.push({t, done:false, answer:''}); save(); render();
}
function addSection() {
  sections.push({title:'New section', items:[]}); save(); render();
}
function resetAll() {
  sections.forEach(s => s.items.forEach(i => i.done = false)); save(); render();
}

function saveAll() {
  document.querySelectorAll('.answer-textarea').forEach(ta => {
    const id = ta.closest('.answer-wrap').id;
    const parts = id.split('-');
    const si = parseInt(parts[1]), ii = parseInt(parts[2]);
    if (sections[si] && sections[si].items[ii]) {
      sections[si].items[ii].answer = ta.value;
    }
  });
  save();
  const el = document.getElementById('save-status');
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

document.getElementById('hdate').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
render();
</script>
</body>
